<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>San Jose Operations Prototype</title>
    <link rel="preload" as="image" href="./operations-center-bg.jpg" fetchpriority="high">
    <link rel="stylesheet" href="./css/styles.css?v=refine1">
    <link rel="stylesheet" href="./css/reports-mobile.css?v=opsreports3">
    <link rel="stylesheet" href="./css/smooth.css?v=smooth1">
    <script type="module" src="./js/app-smooth1.js?v=refine1"></script>
  </head>
  <body>
    <section id="loginScreen" class="login-screen" aria-label="Operations Center sign in">
      <div class="login-overlay"></div>
      <div class="login-content">
        <div class="login-heading"><h1>Operations<br>Center</h1></div>
        <div id="loginChoices" class="login-choices">
          <button class="login-choice" data-login-role="ADMIN" type="button">Admin</button>
          <button class="login-choice" data-login-role="OPERATOR" type="button">Operator</button>
        </div>
        <form id="pinForm" class="pin-card" hidden>
          <button id="backToRoles" class="pin-back" type="button">← Change workspace</button>
          <p id="pinRoleLabel" class="eyebrow">ADMIN ACCESS</p>
          <h2>Enter your 4-digit code</h2>
          <input id="pinInput" inputmode="numeric" autocomplete="one-time-code" maxlength="4" pattern="[0-9]{4}" aria-label="Four digit access code" placeholder="• • • •" required>
          <p id="pinError" class="pin-error" aria-live="polite"></p>
          <button class="login-choice pin-submit" type="button" onclick="window.sjopsCompleteLogin()">Unlock workspace</button>
        </form>
      </div>
      <div class="login-footer">
        <p>Every product is carefully selected and packed in our facility near Aquila, Michoacán preserving quality, tradition, and flavor.</p>
        <img src="../SAN_JOSE_LOGOS.png" alt="San José Farms">
      </div>
    </section>
    <div id="app" hidden>
      <aside class="sidebar">
        <div class="brand">
          <img class="brand-logo" src="../logo_San_Jose.png" alt="San Jose">
          <div>
            <strong>San Jose</strong>
            <small>Operations Prototype</small>
          </div>
        </div>
        <nav id="nav" class="nav"></nav>
      </aside>

      <main class="shell">
        <header class="topbar">
          <button id="menuToggle" class="icon-button" type="button" aria-label="Toggle menu">☰</button>
          <div>
            <h1 id="pageTitle">Dashboard</h1>
            <p id="pageSubtitle">Spreadsheet-backed frontend prototype</p>
          </div>
          <div class="user-panel">
            <span class="user-avatar" id="userAvatar">A</span>
            <div><span class="user-panel-label">Signed in as</span><strong id="currentUserName">Admin</strong></div>
            <button id="signOutButton" class="sign-out" type="button">Sign out</button>
          </div>
        </header>

        <section id="notice" class="notice" hidden></section>
        <section id="view" class="view"></section>
      </main>
    </div>
  </body>
</html>
